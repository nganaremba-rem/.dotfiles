# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #

# you can choose themes from $HOME/.config/kitty/kitty-themes/
# include ./kitty-themes/00-Default.conf
include ./themes/mocha.conf

foreground #a9b1d6
background #1a1b26
selection_foreground #c0caf5
selection_background #7aa2f7

cursor #c0caf5
cursor_text_color #1a1b26

active_border_color #7aa2f7
active_tab_background #7aa2f7

color0 #32344a
color1 #f7768e
color2 #9ece6a
color3 #e0af68
color4 #7aa2f7
color5 #ad8ee6
color6 #449dab
color7 #787c99
color8 #444b6a
color9 #ff7a93
color10 #b9f27c
color11 #ff9e64
color12 #7da6ff
color13 #bb9af7
color14 #0db9d7
color15 #acb0d0


font_family CaskaydiaMono Nerd Font Propo
font_size 14.5
bold_font auto
italic_font auto
bold_italic_font auto

background_opacity 0.95
dynamic_background_opacity 1
confirm_os_window_close 0

# Animated cursor
cursor_trail 1

# change to x11 or wayland or leave auto
linux_display_server auto

scrollback_lines 2000
wheel_scroll_min_lines 1

enable_audio_bell no

window_padding_width 14
window_padding_height 14
# window_padding_width 4

selection_foreground none
selection_background none



# Keybindings
map F11 toggle_fullscreen
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard
map ctrl+d no_op

# Allow remote access
single_instance yes
allow_remote_control yes

# Aesthetics
cursor_shape block
enable_audio_bell no

# Minimal Tab bar styling 
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

clipboard_control write-clipboard write-primary read-clipboard-ask
