# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,alacritty:Tc,wezterm:Tc,*:RGB"

# Prefix
unbind-key C-b
# NOTE: Tmux prefix
set-option -g prefix C-a
bind-key C-a send-prefix


set-window-option -g mode-keys vi

# NOTE: reload tmux
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded"

bind-key -T copy-mode-vi J send-keys -X page-up
bind-key -T copy-mode-vi K send-keys -X page-down
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Faster command delay (very noticeable when using vim/neovim)
set -sg escape-time 10
set -g renumber-windows on

# set -g automatic-rename on
# set -g automatic-rename-format "#{pane_current_command}"
# set -g allow-rename off

# Better clipboard integration (works with most terminals)
set -g set-clipboard on

# Start window/pane indexing at 1 (more natural)
set -g base-index 1
setw -g pane-base-index 1

# =============================================
#  Splits — natural and memorable
# =============================================

# bind | split-window -h -c "#{pane_current_path}"
# bind - split-window -v -c "#{pane_current_path}"
set -g status-position top

# Left: session name (blue background when prefix pressed)
setw -g window-status-current-format " #I:#W#F "
setw -g window-status-format " #I:#W#F "
# Make status bar thin & clean

# Swap windows left/right
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Enable mouse support
set-option -g mouse on

bind n command-prompt -p 'New session name:' 'new-session -s "%%"'
bind p display-popup
bind g display-popup \
-d "#{pane_current_path}" \
-w 90% \
-h 90% \
-E 'lazygit'



bind -n M-h resize-pane -L 2    # Alt+h = resize left 2 cells
bind -n M-j resize-pane -D 2    # Alt+j = resize down 2 cells
bind -n M-k resize-pane -U 2    # Alt+k = resize up 2 cells
bind -n M-l resize-pane -R 2    # Alt+l = resize right 2 cells


# open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"




set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_flags "text"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
# set -g status-right "#{E:@catppuccin_status_application}#{E:@catppuccin_status_host}#{E:@catppuccin_status_date_time}"
set -g status-right "#{E:@catppuccin_status_application}#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}"

# Tmux Package Manager
set -g @plugin 'tmux-plugins/tpm'

# Navigate with C-hjkl
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'
